# Playdate palette (from play.date's colors.css and plaidate.github.io):
# brand yellow #ffc833, darkest gray #1d1c18, warm white #fffdf5.
color:
  palette:
    yellow: "#ffc833"
    ink: "#1d1c18"
    paper: "#fffdf5"
    cream: "#f3ecdb"
    amber: "#8a5d00"
  primary: yellow
  foreground: ink
  background: paper
  link: "#8a5d00"

# play.date is set entirely in Roobert (commercial, Displaay).
# Manrope (OFL) is the closest free face — same semi-rounded
# grotesque skeleton — so it stands in for both text and headings.
typography:
  fonts:
    - family: Manrope
      source: google
      weight: [400, 500, 700, 800]
  base:
    family: Manrope
    weight: 400
  headings:
    family: Manrope
    weight: 800
  link:
    color: amber
